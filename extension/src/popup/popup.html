<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptPilot</title>
  <link rel="stylesheet" href="./popup.css">
</head>
<body>
  <h1>PromptPilot</h1>
  <p class="subtitle">Make your AI prompts smarter with one click.</p>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button id="mode-free" class="mode-btn mode-btn--active" type="button">Free tier</button>
    <button id="mode-byok" class="mode-btn" type="button">Use my API key</button>
  </div>

  <!-- Usage Counter (free tier) -->
  <div id="usage-section" class="section">
    <div class="usage-bar">
      <div id="usage-fill" class="usage-bar__fill"></div>
    </div>
    <p id="usage-text" class="usage-text">0 of 10 enhancements used this hour</p>
  </div>

  <!-- BYOK Settings -->
  <div id="byok-section" class="section" style="display: none;">
    <label for="api-key">API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-... or sk-..." autocomplete="off" spellcheck="false">
    <div id="key-status" class="status"></div>

    <label for="model-select" class="label--model">Model</label>
    <select id="model-select" class="model-select">
      <option value="">Enter an API key first</option>
    </select>
  </div>

  <div id="status" class="status"></div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
