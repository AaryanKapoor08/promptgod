<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptPilot</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 4px 0;
    }
    .subtitle {
      color: #666;
      margin: 0 0 16px 0;
      font-size: 13px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 13px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      min-height: 18px;
    }
    .status--saved {
      color: #16a34a;
    }
    .status--error {
      color: #dc2626;
    }
  </style>
</head>
<body>
  <h1>PromptPilot</h1>
  <p class="subtitle">Make your AI prompts smarter with one click.</p>

  <label for="api-key">API Key</label>
  <input type="password" id="api-key" placeholder="sk-ant-... or sk-or-..." autocomplete="off" spellcheck="false">
  <div id="status" class="status"></div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
