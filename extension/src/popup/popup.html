<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptGod</title>
  <link rel="stylesheet" href="./popup.css">
</head>
<body>
  <div class="header">
    <img class="header-icon" id="header-logo" alt="" />
    <h1>PromptGod</h1>
  </div>
  <p class="subtitle">Make your AI prompts smarter with one click.</p>

  <p class="byok-hint">Bring your own API key to get started. Get one from <a href="https://openrouter.ai/keys" target="_blank" rel="noopener">OpenRouter</a> or use any other key you have (Anthropic, OpenAI, etc.).</p>

  <!-- API Key Settings -->
  <div id="byok-section" class="section">
    <label for="api-key">API Key</label>
    <input type="password" id="api-key" placeholder="sk-or-... / sk-ant-... / sk-..." autocomplete="off" spellcheck="false">
    <div id="key-status" class="status"></div>

    <div class="model-label-row">
      <label for="model-select" class="label--model">Model</label>
      <span id="model-hint" class="model-hint"></span>
    </div>
    <select id="model-select" class="model-select">
      <option value="">Enter an API key first</option>
    </select>
  </div>

  <div id="status" class="status"></div>

  <div class="footer">
    <span class="footer-link">v1.0.0</span>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
