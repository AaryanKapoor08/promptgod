<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptGod Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>PromptGod Settings</h1>
    
    <section class="settings-section">
      <h2>AI Provider API Keys</h2>
      <p class="description">Enter your API keys to use your own quotas. Keys are stored locally on your device.</p>
      
      <div id="api-keys-container">
        <!-- Provider key inputs will be injected here -->
      </div>
      
      <button id="save-all-keys" class="btn btn--primary">Save All Keys</button>
    </section>

    <section class="settings-section">
      <h2>General Settings</h2>
      <!-- Other settings can be added here -->
    </section>
  </div>
  <script src="options.ts"></script>
</body>
</html>
